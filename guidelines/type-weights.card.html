<!-- @dsCard group="Type" viewport="700x200" name="Geist — weights & features" subtitle="ss01 + cv11 always on; 400 / 500 / 600 / 700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--background); color: var(--foreground); }
  .specimen { font-family: var(--font-sans); font-size: 30px; letter-spacing: var(--tracking-tight); line-height: 1.2; }
  .weights { display: flex; gap: 26px; margin-top: 16px; }
  .w { font-family: var(--font-sans); font-size: 21px; }
  .w span { display:block; font: var(--text-2xs)/1.6 var(--font-mono); color: var(--muted-foreground); letter-spacing: var(--tracking-wide); text-transform: uppercase; }
  .feat { margin-top: 14px; font: var(--text-sm)/1.5 var(--font-mono); color: var(--muted-foreground); }
  .feat b { color: var(--foreground); font-weight: 500; }
</style>
</head>
<body>
  <div class="specimen">Aa Gg 0123456789 → IR · uuid</div>
  <div class="weights">
    <div class="w" style="font-weight:400">Geist<span>400 regular</span></div>
    <div class="w" style="font-weight:500">Geist<span>500 medium</span></div>
    <div class="w" style="font-weight:600">Geist<span>600 semibold</span></div>
    <div class="w" style="font-weight:700">Geist<span>700 bold</span></div>
  </div>
  <div class="feat">features: <b>ss01</b> alt single-story a · <b>cv11</b> alt digits</div>
</body>
</html>
