<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Geist — devtool-dense, 10 → 32px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--background); }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; }
  .t { color: var(--foreground); letter-spacing: var(--tracking-tight); white-space: nowrap; }
  .meta { font: var(--text-2xs)/1 var(--font-mono); color: var(--muted-foreground); margin-left: auto; }
</style>
</head>
<body>
  <div class="row"><span class="t" style="font:600 var(--text-2xl)/1.1 var(--font-sans); letter-spacing:var(--tracking-tighter)">Schema as source of truth</span><span class="meta">2xl · 26 · 600</span></div>
  <div class="row"><span class="t" style="font:600 var(--text-xl)/1.2 var(--font-sans)">Visual database design</span><span class="meta">xl · 20 · 600</span></div>
  <div class="row"><span class="t" style="font:500 var(--text-lg)/1.3 var(--font-sans)">Card title — orders table</span><span class="meta">lg · 16 · 500</span></div>
  <div class="row"><span class="t" style="font:400 var(--text-base)/1.4 var(--font-sans)">Body & chrome text, the workhorse size</span><span class="meta">base · 13 · 400</span></div>
  <div class="row"><span class="t" style="font:400 var(--text-sm)/1.4 var(--font-sans); color:var(--muted-foreground)">Secondary UI text and helper copy</span><span class="meta">sm · 12 · 400</span></div>
  <div class="row"><span class="t" style="font:500 var(--text-2xs)/1 var(--font-mono); letter-spacing:var(--tracking-wide); text-transform:uppercase; color:var(--muted-foreground)">Eyebrow / section label</span><span class="meta">2xs · 10 · 500</span></div>
</body>
</html>
