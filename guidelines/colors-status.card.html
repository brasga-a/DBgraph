<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Live / on, primary-key / warning, destructive" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--background); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 56px; border-radius: var(--radius-md); box-shadow: var(--ring-card); display:flex; align-items:flex-end; padding: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .name { font: var(--weight-medium) var(--text-sm)/1.4 var(--font-sans); color: var(--foreground); margin-top: 8px; }
  .use { font: var(--text-xs)/1.4 var(--font-sans); color: var(--muted-foreground); margin-top: 1px; }
  .val { font: var(--text-2xs)/1.4 var(--font-mono); color: var(--muted-foreground); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><div class="name">green-500</div><div class="use">live · on · success</div><div class="val">.723 .179 154</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-500)"></div><div class="name">amber-500</div><div class="use">primary-key · warning</div><div class="val">.769 .156 78</div></div>
    <div class="sw"><div class="chip" style="background:var(--red-500)"></div><div class="name">red-500</div><div class="use">destructive · over</div><div class="val">.577 .245 27</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="name">blue-500</div><div class="use">foreign-key · accent</div><div class="val">.623 .214 260</div></div>
  </div>
</body>
</html>
