<!-- @dsCard group="Spacing" viewport="700x170" name="Radius scale" subtitle="10px base, scaled — modest, soft corners" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--background); }
  .row { display: flex; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 9px; flex: 1; }
  .box { width: 100%; height: 64px; background: var(--muted); border: 1px solid var(--border-3); }
  .name { font: var(--weight-medium) var(--text-xs)/1 var(--font-sans); color: var(--foreground); }
  .val { font: var(--text-2xs)/1 var(--font-mono); color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="val">6</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="val">8</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg · base</div><div class="val">10</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl · card</div><div class="val">14</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="name">2xl</div><div class="val">18</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-full); width:64px"></div><div class="name">full</div><div class="val">pill</div></div>
  </div>
</body>
</html>
