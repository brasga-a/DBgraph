<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="Lucide Database in blue + Geist 600 'DBgraph'" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { display: flex; align-items: center; justify-content: center; height: 180px; }
  .light { background: var(--background); }
  .dark { background: var(--background); }
  .mark { display: inline-flex; align-items: center; gap: 8px; color: var(--foreground);
          font: 600 18px/1 var(--font-sans); letter-spacing: var(--tracking-tight);
          font-feature-settings: var(--font-features); }
  .mark svg { width: 20px; height: 20px; color: var(--brand); }
</style>
</head>
<body>
  <div class="pane light">
    <span class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>
      DBgraph
    </span>
  </div>
  <div class="pane dark">
    <span class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>
      DBgraph
    </span>
  </div>
</body>
</html>
